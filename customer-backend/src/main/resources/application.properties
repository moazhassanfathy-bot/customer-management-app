spring.application.name=customer_management

# إعدادات الاتصال بقاعدة بيانات MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/customer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# اكتب الباسورد الخاص بـ MySQL بتاعك هنا بين علامتين اليساوي (لو ملوش باسورد سيبها فاضية)
spring.datasource.password=root123

# إعدادات الـ JPA و Hibernate لـ MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true